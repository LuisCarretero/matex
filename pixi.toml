[workspace]
name = "matex"
version = "0.1.0"
description = "Known Unknowns: Out-of-Distribution Property Prediction in Materials and Molecules"
channels = ["conda-forge", "pytorch"]
platforms = ["linux-64"]

[dependencies]
python = "3.9.*"
numpy = ">=1.25,<2"
scipy = ">=1.10.1"
pandas = "==1.5.3"
scikit-learn = "==1.5.0"
matplotlib = "*"
seaborn = "*"
tqdm = "*"
ipykernel = ">=6.29"
pip = "*"
pytorch = { version = ">=2", channel = "pytorch" }
pytorch-cuda = { version = "12.*", channel = "pytorch" }

[pypi-dependencies]
tensorflow = "==2.15.1"
matminer = "==0.9.2"
pymatgen = "==2024.5.31"
modnet = "*"
deepchem = "*"
chemprop = "*"
"ruamel.yaml" = "*"
